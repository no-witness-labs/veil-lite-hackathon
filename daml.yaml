sdk-version: 3.5.1
name: veil
source: daml
version: 0.1.0
dependencies:
  - daml-prim
  - daml-stdlib
# CIP-056 token-standard interfaces (Splice). The deployable templates reference only these
# interfaces, so the DAR stays implementation-agnostic and free of any concrete-token dependency.
data-dependencies:
  - dars/splice-api-token-metadata-v1-1.0.0.dar
  - dars/splice-api-token-holding-v1-1.0.0.dar
  - dars/splice-api-token-allocation-v1-1.0.0.dar
  - dars/splice-api-token-allocation-instruction-v1-1.0.0.dar
  - dars/splice-api-token-transfer-instruction-v1-1.0.0.dar
build-options:
  - --target=2.1
